apiVersion: apps/v1
kind: Deployment
metadata:
  name: srvcs-www
  namespace: srvcs-prod
  labels:
    app.kubernetes.io/name: srvcs-www
    app.kubernetes.io/part-of: srvcs
    srvcs.cloud/service: www
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: srvcs-www
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: srvcs-www
        app.kubernetes.io/part-of: srvcs
        srvcs.cloud/service: www
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: srvcs-www
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: srvcs-www
          image: ghcr.io/srvcs/www:75be6776f6d09b1fdde2ec3b94eea24a94f752d7
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SRVCS_ENV
              value: production
            - name: SRVCS_BIND_ADDR
              value: 0.0.0.0:8080
            - name: RUST_LOG
              value: info,tower_http=info
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
